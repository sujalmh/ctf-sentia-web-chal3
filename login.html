<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in — Sentia Portal</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Log in</h1>
        <p>Use your account credentials.</p>
      </header>
      <div class="card">
        <div id="err" class="msg err" style="display: none"></div>
        <div
          id="success"
          class="msg ok"
          style="display: none"
          role="status"
          aria-live="polite"
        ></div>
        <div id="form-block">
        <form id="login-form">
          <label for="username">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
          />
          <label for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="btn">Log in</button>
        </form>
        </div>
        <p class="nav-links" id="login-nav">
          No account? <a href="register.html">Register</a> ·
          <a href="index.html">Home</a>
        </p>
      </div>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
